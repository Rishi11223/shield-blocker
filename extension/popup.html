<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #eee; padding: 16px;
    }
    h1 { font-size: 16px; font-weight: 700; color: #00e676; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle {
      width: 44px; height: 24px; background: #555; border-radius: 12px;
      cursor: pointer; position: relative; transition: 0.2s; flex-shrink: 0;
    }
    .toggle.on { background: #00e676; }
    .toggle::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.2s;
    }
    .toggle.on::after { left: 22px; }
    .stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .stat-box {
      flex: 1; background: #22223a; border-radius: 8px; padding: 12px; text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; color: #ffb300; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
    .section-title { font-size: 12px; color: #888; margin-bottom: 8px; }
    .allowlist-input {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .allowlist-input input {
      flex: 1; background: #22223a; border: 1px solid #3a3a5a; color: #eee;
      padding: 6px 8px; border-radius: 4px; font-size: 12px;
    }
    .allowlist-input button {
      background: #2a2a4a; border: none; color: #ccc; padding: 6px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    .allowlist-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 8px; background: #22223a; border-radius: 4px; margin-bottom: 4px; font-size: 12px;
    }
    .allowlist-item button {
      background: none; border: none; color: #f44336; cursor: pointer; font-size: 14px;
    }
    .list-wrap { max-height: 140px; overflow-y: auto; }
    .footer { font-size: 10px; color: #555; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🛡</span> Shield Blocker</h1>
    <div class="toggle-wrap">
      <span id="statusLabel" style="font-size:12px">On</span>
      <div class="toggle on" id="toggleBtn"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="blockedCount">0</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="rulesCount">0</div>
      <div class="stat-label">Rules Active</div>
    </div>
  </div>

  <div class="section-title">Allowlist</div>
  <div class="allowlist-input">
    <input id="allowInput" placeholder="example.com" onkeydown="if(event.key==='Enter')addAllow()">
    <button onclick="addAllow()">Add</button>
  </div>
  <div class="list-wrap" id="allowlistContainer"></div>

  <div class="footer">Shield Blocker v1.0.0 — Filter lists from EasyList</div>

  <script src="popup.js"></script>
</body>
</html>
